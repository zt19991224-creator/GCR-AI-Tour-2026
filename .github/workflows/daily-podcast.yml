name: Daily Podcast Generator

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Lab-02-Podcast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --pre

      - name: Get topic from title.txt
        id: get-topic
        run: |
          # 读取第一行主题
          TOPIC=$(head -n 1 topic/title.txt)

          if [ -z "$TOPIC" ]; then
            echo "Error: No topic found in title.txt"
            exit 1
          fi

          echo "Selected topic: $TOPIC"
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT

          # 删除已使用的第一行，保留其余行
          tail -n +2 topic/title.txt > topic/title.txt.tmp
          mv topic/title.txt.tmp topic/title.txt

          # 如果文件为空，添加提示信息
          if [ ! -s topic/title.txt ]; then
            echo "# 所有主题已处理完毕，请添加新的主题" > topic/title.txt
          fi

      - name: Run podcast workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_COPILOT_MODEL: gpt-5.4
          GITHUB_COPILOT_TIMEOUT: "60"
          GITHUB_COPILOT_CLI_PATH: copilot
          GITHUB_COPILOT_LOG_LEVEL: info
        run: |
          python podcast_workflow.py -t "${{ steps.get-topic.outputs.topic }}"

      - name: Commit and push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 添加所有变更（包括生成的 podcast 文件和更新的 title.txt）
          git add .

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎙️ Generate podcast for: ${{ steps.get-topic.outputs.topic }}"
            git push
          fi
